kind = "web"
previewPath = "/"
title = "Inbox AI"
version = "1.0.0"
id = "artifacts/inbox-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23971

[services.development]
run = "pnpm --filter @workspace/inbox-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inbox-ai", "run", "build" ]
publicDir = "artifacts/inbox-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23971"
BASE_PATH = "/"
