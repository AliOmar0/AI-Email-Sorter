name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          NODE_ENV: production
          # vite.config.ts requires PORT even for builds; any value works.
          PORT: "5000"
          # Project page is served under /<repo-name>/ on github.io.
          BASE_PATH: "/${{ github.event.repository.name }}/"
          # Set this repository variable to your deployed Vercel backend URL,
          # e.g. https://your-backend.vercel.app
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: pnpm --filter @workspace/inbox-ai run build

      - name: Add SPA fallback for client-side routing
        run: cp artifacts/inbox-ai/dist/public/index.html artifacts/inbox-ai/dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/inbox-ai/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
